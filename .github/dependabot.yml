version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      next-react:
        patterns:
          - next
          - react
          - react-dom
          - eslint-config-next
      testing:
        patterns:
          - vitest
          - "@vitest/*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

